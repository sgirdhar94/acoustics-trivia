<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noise News Trivia</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #f5f4f0;
    color: #111;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  header { text-align: center; margin-bottom: 32px; }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #2563eb;
    margin-bottom: 8px;
  }

  h1 { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 700; color: #111; margin-bottom: 8px; }
  h1 span { color: #2563eb; }

  .hour-badge {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #999;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 3px 12px;
  }

  .card {
    background: #fff;
    border: 1px solid #e0dedd;
    border-radius: 12px;
    padding: 28px 24px;
    width: 100%;
    max-width: 520px;
  }

  .q-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #aaa;
    margin-bottom: 12px;
  }

  .question-text {
    font-size: 1.1rem;
    font-weight: 600;
    line-height: 1.55;
    color: #111;
    margin-bottom: 24px;
  }

  textarea {
    width: 100%;
    background: #f5f4f0;
    border: 1px solid #ddd;
    border-radius: 8px;
    color: #111;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    padding: 12px 14px;
    resize: vertical;
    min-height: 76px;
    outline: none;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #2563eb; }
  textarea::placeholder { color: #bbb; }

  .btn {
    margin-top: 12px;
    width: 100%;
    background: #111;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    padding: 14px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }

  .btn:hover { background: #333; }
  .btn:active { transform: scale(0.98); }

  .btn-secondary {
    background: transparent;
    color: #444;
    border: 1px solid #ddd;
    margin-top: 10px;
  }

  .btn-secondary:hover { background: #f5f4f0; }

  .result {
    display: none;
    margin-top: 20px;
    padding: 16px;
    border-radius: 8px;
    text-align: center;
  }

  .result.correct {
    background: rgba(22,163,74,0.06);
    border: 1px solid #16a34a;
  }

  .result.wrong {
    background: rgba(220,38,38,0.06);
    border: 1px solid #dc2626;
  }

  .result-icon { font-size: 1.6rem; margin-bottom: 4px; }

  .result-verdict { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
  .result.correct .result-verdict { color: #16a34a; }
  .result.wrong .result-verdict { color: #dc2626; }

  .result-answer { font-size: 0.88rem; color: #888; line-height: 1.5; }
  .result-answer strong { color: #111; display: block; margin-top: 4px; font-size: 0.95rem; }

  .prize-banner {
    display: none;
    margin-top: 12px;
    background: rgba(37,99,235,0.06);
    border: 1px solid #2563eb;
    border-radius: 8px;
    padding: 14px 18px;
    text-align: center;
  }

  .prize-banner .prize-icon { font-size: 1.4rem; margin-bottom: 4px; }
  .prize-banner p { font-size: 0.92rem; font-weight: 600; color: #2563eb; line-height: 1.5; }

  footer {
    margin-top: 32px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #ccc;
    text-align: center;
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Noise News International</p>
  <h1>Acoustics <span>Trivia</span></h1>
  <div class="hour-badge" id="hour-badge"></div>
</header>

<div class="card">
  <p class="q-label">Your question</p>
  <p class="question-text" id="question-display"></p>

  <textarea id="answer-input" placeholder="Type your answer here..."></textarea>
  <button class="btn" id="submit-btn" onclick="checkAnswer()">Submit answer</button>

  <div class="result" id="result-box">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-verdict" id="result-verdict"></div>
    <div class="result-answer">The accepted answer: <strong id="correct-answer-display"></strong></div>
  </div>

  <div class="prize-banner" id="prize-banner">
    <div class="prize-icon">🎉</div>
    <p>You got it! Visit the INCE Booth to claim your prize!</p>
  </div>

  <button class="btn btn-secondary" id="new-q-btn" onclick="loadNewRandom()" style="display:none;">Ask me another one</button>
</div>

<footer>Noise News International &mdash; Conference Booth Trivia</footer>

<script>
const QUESTIONS = [
  { q: "Which acoustician designed Boston Symphony Hall?", a: "Wallace Clement Sabine" },
  { q: "What acoustician is responsible for the Noise Criteria (NC) curves?", a: "Beranek / Leo Beranek" },
  { q: "What acoustician is responsible for the Room Criteria (RC) curves?", a: "Blazier" },
  { q: "What is a reasonable NRC for a 2\" fiberglass panel (type A mounting)?", a: "1.1" },
  { q: "Based on testing done at NRC, what is the approximate difference in level, all else being equal, of a toilet flush with cast iron vs. ABS (plastic) drain pipe?", a: "10 dB" },
  { q: "A toilet exhaust fan is rated at 2 sones. This corresponds to approximately what SPL?", a: "50 dB" },
  { q: "What is the decibel reference for sound pressure level in air?", a: "20 µPa" },
  { q: "What is the decibel reference for sound pressure in water?", a: "1 µPa" },
  { q: "What is the ratio of angular frequency to frequency?", a: "2π (two pi)" },
  { q: "Complete this analogy: period is to frequency as wavelength is to ____.", a: "Wavenumber" },
  { q: "Assuming harmonic analysis, what is the relationship between acceleration and velocity?", a: "Differentiate velocity to get acceleration (or integrate acceleration to get velocity)" },
  { q: "The speed of sound in air — increases, decreases, or does not change significantly with temperature?", a: "Increases" },
  { q: "The International Building Code requires what minimum IIC rating for assemblies between residences?", a: "IIC 50" },
  { q: "According to the WHO Guidelines for Community Noise (1999), to avoid negative effects on sleep, the indoor LAeq should not exceed what level?", a: "LAeq 30 dB" },
  { q: "According to the WHO Guidelines for Community Noise (1999), to avoid negative effects on sleep, the indoor LAFmax should not exceed what level?", a: "LAFmax 45 dB" },
  { q: "In a condenser microphone, the diaphragm and backplate form a ___, whose value changes due to sound pressure.", a: "Capacitor" },
  { q: "What are the time constants for Fast and Slow exponential time weightings?", a: "Fast = 125 ms, Slow = 1 sec (1000 ms)" },
  { q: "For transducers, what does CCLD stand for?", a: "Constant Current Line Drive" },
  { q: "Compared to a free-field measurement, a measurement with the microphone flush to a surface (such as a façade) theoretically increases the measured level by how much?", a: "6 dB" },
  { q: "What is G-weighting in sound measurements used for?", a: "Infrasound" },
  { q: "What is the approximate upper frequency limit of hearing of rats?", a: "80–90 kHz" },
  { q: "In vibroacoustics, the reciprocal of impedance is _____.", a: "Admittance" },
  { q: "In a 2007 JASA-EL study, a hearing threshold of 101 dB was measured at what frequency in the most sensitive individuals?", a: "28 kHz" },
  { q: "In a 2004 review by Aalborg University researchers, the low-frequency hearing threshold was suggested to extend down to which frequency?", a: "2 Hz" },
  { q: "What is the difference between Lden and Ldn?", a: "Lden adds an additional 5 dB evening penalty" },
  { q: "What is the 'crest factor' of a noise signal?", a: "Ratio of peak to RMS level" },
  { q: "What is the Schroeder frequency?", a: "The frequency above which a room is statistically diffuse" },
  { q: "What is the critical frequency (coincidence frequency) of a panel?", a: "The frequency at which the bending wave speed in the panel matches the speed of sound in air" },
  { q: "What are the three fundamental parts of a noise control problem?", a: "Source, path, and receiver" },
  { q: "What is 'break-out' noise in ductwork?", a: "Sound from inside a duct radiating outward through duct walls into a room" },
  { q: "What is infrasound?", a: "Low-frequency noise below 20 Hz" },
  { q: "How do you add SPL from two equal coherent sources at a location?", a: "Add 6 dB" },
  { q: "How do you add SPL from two equal incoherent sources at a location?", a: "Add 3 dB" },
  { q: "What is the term for sound bending around an obstacle?", a: "Diffraction" },
  { q: "What ear structure converts sound vibrations to neural signals?", a: "Cochlea" },
  { q: "What lab-test rating describes a floor's impact noise resistance?", a: "IIC (Impact Insulation Class)" },
  { q: "What is the European equivalent metric to STC?", a: "Rw" },
  { q: "What effect causes an ambulance's siren pitch to change as it passes you?", a: "Doppler effect" },
  { q: "What is the term for vibration's resonant frequency?", a: "Natural frequency" }
];

let current = null;

function currentHourKey() {
  const now = new Date();
  return `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}${String(now.getHours()).padStart(2,'0')}`;
}

function getPersonalQuestion() {
  const hourKey = currentHourKey();
  try {
    const stored = JSON.parse(localStorage.getItem('nni_trivia') || '{}');
    if (stored.hour === hourKey && typeof stored.index === 'number') {
      return QUESTIONS[stored.index];
    }
  } catch(e) {}
  const index = Math.floor(Math.random() * QUESTIONS.length);
  try { localStorage.setItem('nni_trivia', JSON.stringify({ hour: hourKey, index })); } catch(e) {}
  return QUESTIONS[index];
}

function pickNewRandom() {
  const hourKey = currentHourKey();
  const index = Math.floor(Math.random() * QUESTIONS.length);
  try { localStorage.setItem('nni_trivia', JSON.stringify({ hour: hourKey, index })); } catch(e) {}
  return QUESTIONS[index];
}

function updateHourBadge() {
  const now = new Date();
  const next = new Date(now);
  next.setHours(next.getHours() + 1, 0, 0, 0);
  const minsLeft = Math.round((next - now) / 60000);
  document.getElementById('hour-badge').textContent =
    minsLeft <= 1 ? 'Question resets soon' : `Your question resets in ${minsLeft} min`;
}

function displayQuestion(q) {
  current = q;
  document.getElementById('question-display').textContent = current.q;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').style.display = 'block';
  document.getElementById('submit-btn').style.display = 'block';
  const resultBox = document.getElementById('result-box');
  resultBox.style.display = 'none';
  resultBox.className = 'result';
  document.getElementById('prize-banner').style.display = 'none';
  document.getElementById('new-q-btn').style.display = 'none';
}

function loadNewRandom() { displayQuestion(pickNewRandom()); }

function checkAnswer() {
  const input = document.getElementById('answer-input').value.trim();
  if (!input) return;

  const resultBox = document.getElementById('result-box');
  const stopwords = new Set(['a','an','the','is','are','in','of','to','and','or','for','at','by','as','on','with','that','this','it','its','be','was','were','has','have','from']);
  const keyWords = current.a.toLowerCase().split(/[\s\/,\(\)]+/).filter(w => w.length > 1 && !stopwords.has(w));
  const matchCount = keyWords.filter(w => input.toLowerCase().includes(w)).length;
  const correct = keyWords.length > 0 && matchCount >= Math.ceil(keyWords.length * 0.5);

  if (correct) {
    resultBox.className = 'result correct';
    document.getElementById('result-icon').textContent = '✓';
    document.getElementById('result-verdict').textContent = 'Correct!';
    document.getElementById('prize-banner').style.display = 'block';
  } else {
    resultBox.className = 'result wrong';
    document.getElementById('result-icon').textContent = '✗';
    document.getElementById('result-verdict').textContent = 'Not quite.';
    document.getElementById('prize-banner').style.display = 'none';
  }

  document.getElementById('correct-answer-display').textContent = current.a;
  resultBox.style.display = 'block';
  document.getElementById('answer-input').style.display = 'none';
  document.getElementById('submit-btn').style.display = 'none';
  document.getElementById('new-q-btn').style.display = 'block';
}

document.addEventListener('DOMContentLoaded', () => {
  displayQuestion(getPersonalQuestion());
  updateHourBadge();
  setInterval(updateHourBadge, 60000);
  document.getElementById('answer-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); checkAnswer(); }
  });
});
</script>
</body>
</html>
